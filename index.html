    <script>
      const arr = [1, 0, 2, 3, 0, 4, 5, 0];
      const arr1 = [1, 0, 2, 3, 0, 4, 5];
      const arr3 = [0, 0, 0, 0, 0, 0, 0];

      function duplicateZeros(arr) {
        let des = 0; // 已消费的槽位数
        let cur = 0; // 最后处理的原始索引

        // 第一轮：找到截断位置
        for (let i = 0; i < arr.length; i++) {
          if (arr[i]) {
            des += 1;
          } else {
            des += 2;
          }
          if (des >= arr.length) {
            cur = i;
            break;
          }
        }

        // 边界：最后一个 0 只能放一份拷贝
        if (des > arr.length) {
          arr[arr.length - 1] = 0;
          des = arr.length - 1;
          cur--;
        }

        // 第二轮：从后往前填充
        for (let i = cur; i >= 0; i--) {
          if (arr[i]) {
            arr[--des] = arr[i];
          } else {
            arr[--des] = 0;
            arr[--des] = 0;
          }
        }

        return arr;
      }

      console.log(duplicateZeros(arr));
    </script>
