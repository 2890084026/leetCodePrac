<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    66622
    <script>
        function compress(chars) {
            let read = 0; // 读取指针
            let write = 0; // 写入指针
            let count = 1; // 计数器

            while (read < chars.length) {
                // 当前字符与下一个字符相等时，增加计数器
                if (read + 1 < chars.length && chars[read] === chars[read + 1]) {
                    count++;
                    read++;
                } else {
                    // 写入当前字符
                    chars[write] = chars[read];
                    write++;

                    // 如果计数器大于 1，则写入计数器
                    if (count > 1) {
                        const strCount = count.toString();
                        for (let i = 0; i < strCount.length; i++) {
                            chars[write] = strCount[i];
                            write++;
                        }
                    }

                    // 更新计数器并移动读取指针
                    count = 1;
                    read++;
                }
            }

            // 返回新长度
            return write;
        }

        // 示例
        const chars = ["a", "a", "a", "b", "b", "c", "c", "c"];
        const newLength = compress(chars);
        console.log(newLength); // 输出: 6
        // console.log(chars.slice(0, newLength)); // 输出: ['a', '2', 'b', '2', 'c', '3']
    </script>
</body>

</html>
