<!DOCTYPE html>

</head>

<body>
    66622
    <script>
        nums = [1, 3, -1, -3, 5, 3, 6, 7], k = 3
        function maxSlidingWindow(nums, k) {
            const q = []; // 双端队列，存下标
            const res = [];

            for (let i = 0; i < nums.length; i++) {
                // 1. 移除超出窗口左边界的元素
                while (q.length && q[0] < i - k + 1) {
                    q.shift();
                }

                // 2. 移除比当前元素小的队尾（不可能成为最大值）
                while (q.length && nums[i] >= nums[q[q.length - 1]]) {
                    q.pop();
                }

                // 3. 加入当前元素下标
                q.push(i);

                // 4. 窗口形成后，记录队首最大值
                if (i >= k - 1) {
                    res.push(nums[q[0]]);
                }
            }

            return res;
        }
        maxSlidingWindow(nums, k)
    </script>
</body>

</html>
