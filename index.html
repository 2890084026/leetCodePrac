        function largestRectangleArea(heights) {
            const stack = [];
            let maxArea = 0;
            // 末尾补一个0，强制把栈里所有元素都结算掉
            heights.push(0);

            for (let i = 0; i < heights.length; i++) {
                // 当前高度 小于 栈顶高度，开始出栈计算
                while (stack.length && heights[i] < heights[stack.at(-1)]) {
                    const cur = stack.pop();
                    const h = heights[cur];
                    // 左边界
                    const left = stack.length ? stack.at(-1) : -1;
                    const w = i - left - 1;
                    maxArea = Math.max(maxArea, h * w);
                }
                stack.push(i);
            }
            return maxArea;
        }
        console.log(largestRectangleArea([2, 1, 5, 6, 2, 3])) // 10
        console.log(largestRectangleArea([1, 2, 3, 4, 5])) // 9
        console.log(largestRectangleArea([5, 4, 3, 2, 1])) // 9
        console.log(largestRectangleArea([])) // 0
        console.log(largestRectangleArea([1])) // 1
