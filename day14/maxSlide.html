<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>滑动窗口最大值 动画演示（代码行高亮）</title>
  <style>
    body { font-family: "Microsoft YaHei", Arial; padding: 20px; background: #111; color: #fff; }
    .container { max-width: 1200px; margin: 0 auto; }
    h2 { text-align: center; }
    .info { margin: 12px 0; font-size: 16px; line-height: 1.8; }
    .arr-box { display: flex; gap: 6px; margin: 30px 0; justify-content: center; flex-wrap: wrap; }
    .cell {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; border-radius: 6px;
      background: #333; border: 2px solid #555;
      position: relative;
    }
    .window-start { border-color: #4cf; box-shadow: 0 0 8px #4cf; } /* 窗口左边界-蓝色 */
    .window-end { border-color: #f84; box-shadow: 0 0 8px #f84; }   /* 窗口右边界-橙色 */
    .window-inner { border-color: #6a8; box-shadow: 0 0 8px #6a8; } /* 窗口内部-绿色 */
    .window-max { border-color: #ff0; box-shadow: 0 0 8px #ff0; }   /* 窗口最大值-黄色 */
    .btn-group { margin: 15px 0; text-align: center; }
    .btn-group button {
      padding: 8px 16px; font-size: 15px;
      margin: 0 6px; cursor: pointer;
      background: #236; color: #fff; border: none; border-radius: 4px;
    }
    .btn-group button:disabled { background: #444; cursor: not-allowed; }
    /* 代码区域样式 */
    .code-wrap {
      margin-top: 30px;
      background: #1a1a1a;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #444;
    }
    .code-title { font-size:18px; margin-bottom:10px; color:#8cf; }
    pre { font-family: Consolas,monospace; font-size:14px; line-height:1.6; margin:0; }
    .code-line { display:block; padding:2px 6px; border-radius:3px; }
    .active-line { background:#305; } /* 当前执行行高亮 */
    /* 结果展示区 */
    .result-wrap {
      margin: 20px 0;
      text-align: center;
      font-size: 18px;
    }
    .result-title { color: #8cf; margin-bottom: 8px; }
    .result-box {
      display: inline-flex;
      gap: 8px;
      padding: 10px 20px;
      background: #1a1a1a;
      border-radius: 6px;
      border: 1px solid #444;
    }
    .result-item {
      width: 40px; height: 40px;
      line-height: 40px;
      text-align: center;
      background: #333;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>滑动窗口最大值 动画演示（双端队列实现）</h2>
  <div class="info">
    <div>窗口左边界：<span style="color:#4cf">蓝色边框</span> (left)</div>
    <div>窗口右边界：<span style="color:#f84">橙色边框</span> (right)</div>
    <div>窗口内部元素：<span style="color:#6a8">绿色边框</span></div>
    <div>窗口最大值：<span style="color:#ff0">黄色边框</span></div>
    <div id="stepText">当前步骤：等待操作</div>
    <div id="varText"></div>
  </div>

  <div class="arr-box" id="arrWrap"></div>

  <!-- 结果展示 -->
  <div class="result-wrap">
    <div class="result-title">滑动窗口最大值结果</div>
    <div class="result-box" id="resultWrap"></div>
  </div>

  <div class="btn-group">
    <button id="autoPlayBtn">自动播放</button>
    <button id="pauseBtn" disabled>暂停</button>
    <button id="nextStepBtn">单步下一步</button>
    <button id="resetBtn">重置</button>
  </div>

  <!-- 代码展示区域 -->
  <div class="code-wrap">
    <div class="code-title">算法源码（当前执行行会紫色高亮）</div>
    <pre id="codeBox"></pre>
  </div>
</div>

<script>
// 原始测试数组和窗口大小
const originNums = [1,3,-1,-3,5,3,6,7];
const windowSize = 3;
let nums = JSON.parse(JSON.stringify(originNums));
let stepQueue = [];
let timer = null;
let curStepIdx = 0;
let isPlaying = false;

// 源码文本 + 每一行对应编号（用于匹配高亮）
const codeSource = [
  { line:1, text:"function maxSlidingWindow(nums, k) {" },
  { line:2, text:"  const deque = []; // 双端队列：存储nums下标，保证队首是窗口最大值下标" },
  { line:3, text:"  const result = [];" },
  { line:4, text:"  const n = nums.length;" },
  { line:5, text:"  for (let right = 0; right < n; right++) {" },
  { line:6, text:"    // 1. 维护队列单调性：移除比当前元素小的队尾元素" },
  { line:7, text:"    while (deque.length && nums[right] >= nums[deque[deque.length-1]]) {" },
  { line:8, text:"      deque.pop();" },
  { line:9, text:"    }" },
  { line:10,text:"    // 2. 当前元素下标入队" },
  { line:11,text:"    deque.push(right);" },
  { line:12,text:"    // 3. 移除超出窗口左边界的队首元素" },
  { line:13,text:"    const left = right - k + 1;" },
  { line:14,text:"    while (deque[0] < left) {" },
  { line:15,text:"      deque.shift();" },
  { line:16,text:"    }" },
  { line:17,text:"    // 4. 窗口形成后，记录最大值（队首）" },
  { line:18,text:"    if (right >= k - 1) {" },
  { line:19,text:"      result.push(nums[deque[0]]);" },
  { line:20,text:"    }" },
  { line:21,text:"  }" },
  { line:22,text:"  return result;" },
  { line:23,text:"}" }
];

// 构建步骤队列（核心：模拟算法执行过程，记录每一步状态）
function buildSteps() {
  stepQueue = [];
  nums = JSON.parse(JSON.stringify(originNums));
  const deque = [];
  const result = [];
  const n = nums.length;
  const k = windowSize;

  // 初始化步骤
  stepQueue.push({
    desc: "初始化：双端队列为空，结果数组为空，开始遍历数组",
    right: -1, left: -1, 
    arr: [...nums], deque: [...deque], result: [...result],
    maxIdx: -1, codeLine: 2
  });

  for (let right = 0; right < n; right++) {
    // 步骤1：进入外层循环，当前右边界
    stepQueue.push({
      desc: `右边界右移至 ${right}，当前元素 ${nums[right]}`,
      right, left: right - k + 1, 
      arr: [...nums], deque: [...deque], result: [...result],
      maxIdx: deque.length > 0 ? deque[0] : -1, codeLine: 5
    });

    // 步骤2：维护队列单调性（移除比当前小的队尾）
    while (deque.length && nums[right] >= nums[deque[deque.length-1]]) {
      const popIdx = deque.pop();
      stepQueue.push({
        desc: `队尾元素 ${nums[popIdx]} (下标${popIdx}) 小于当前元素 ${nums[right]}，弹出队尾`,
        right, left: right - k + 1, 
        arr: [...nums], deque: [...deque], result: [...result],
        maxIdx: deque.length > 0 ? deque[0] : -1, codeLine: 8
      });
    }

    // 步骤3：当前下标入队
    deque.push(right);
    stepQueue.push({
      desc: `当前元素下标 ${right} 入队，队列变为 [${deque.join(',')}]`,
      right, left: right - k + 1, 
      arr: [...nums], deque: [...deque], result: [...result],
      maxIdx: deque[0], codeLine: 11
    });

    // 步骤4：移除超出左边界的队首
    const left = right - k + 1;
    stepQueue.push({
      desc: `计算窗口左边界 left = ${right} - ${k} + 1 = ${left}`,
      right, left, 
      arr: [...nums], deque: [...deque], result: [...result],
      maxIdx: deque.length > 0 ? deque[0] : -1, codeLine: 13
    });

    while (deque[0] < left) {
      const shiftIdx = deque.shift();
      stepQueue.push({
        desc: `队首下标 ${shiftIdx} 超出窗口左边界 ${left}，弹出队首`,
        right, left, 
        arr: [...nums], deque: [...deque], result: [...result],
        maxIdx: deque.length > 0 ? deque[0] : -1, codeLine: 15
      });
    }

    // 步骤5：窗口形成后记录最大值
    if (right >= k - 1) {
      result.push(nums[deque[0]]);
      stepQueue.push({
        desc: `窗口 [${left}, ${right}] 形成，记录最大值 ${nums[deque[0]]}`,
        right, left, 
        arr: [...nums], deque: [...deque], result: [...result],
        maxIdx: deque[0], codeLine: 19
      });
    }
  }

  // 最终步骤
  stepQueue.push({
    desc: `遍历完成，最终结果：[${result.join(',')}]`,
    right: n-1, left: (n-1) - k + 1, 
    arr: [...nums], deque: [...deque], result: [...result],
    maxIdx: deque.length > 0 ? deque[0] : -1, codeLine: 22
  });
}

// DOM元素
const arrWrap = document.getElementById('arrWrap');
const stepText = document.getElementById('stepText');
const varText = document.getElementById('varText');
const resultWrap = document.getElementById('resultWrap');
const autoPlayBtn = document.getElementById('autoPlayBtn');
const pauseBtn = document.getElementById('pauseBtn');
const nextStepBtn = document.getElementById('nextStepBtn');
const resetBtn = document.getElementById('resetBtn');
const codeBox = document.getElementById('codeBox');

// 渲染数组格子
function renderUI(step) {
  arrWrap.innerHTML = '';
  const { right, left, arr, maxIdx } = step;
  const k = windowSize;

  for(let i=0; i<arr.length; i++) {
    const div = document.createElement('div');
    div.className = 'cell';
    div.textContent = arr[i];
    
    // 标记窗口边界/内部/最大值
    if (i === left && right >= k-1) {
      div.classList.add('window-start'); // 左边界
    } else if (i === right) {
      div.classList.add('window-end');   // 右边界
    } else if (i >= left && i <= right && right >= k-1) {
      div.classList.add('window-inner'); // 窗口内部
    }
    if (i === maxIdx) {
      div.classList.add('window-max');   // 最大值
    }

    arrWrap.appendChild(div);
  }
}

// 渲染结果数组
function renderResult(result) {
  resultWrap.innerHTML = '';
  result.forEach(num => {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.textContent = num;
    resultWrap.appendChild(div);
  });
}

// 渲染代码并高亮当前行
function renderCode(activeLineNum) {
  codeBox.innerHTML = '';
  codeSource.forEach(item => {
    const span = document.createElement('span');
    span.className = 'code-line';
    span.textContent = item.text;
    if(item.line === activeLineNum) span.classList.add('active-line');
    codeBox.appendChild(span);
  });
}

// 渲染当前一步全部视图
function renderCurrentStep() {
  if(curStepIdx >= stepQueue.length) return;
  const s = stepQueue[curStepIdx];
  
  // 更新步骤文本
  stepText.textContent = `步骤 ${curStepIdx+1}/${stepQueue.length}：${s.desc}`;
  // 更新变量文本
  varText.innerHTML = `right=${s.right} &nbsp;&nbsp; left=${s.left} 
    &nbsp;&nbsp; 队列=[${s.deque.join(',')}] &nbsp;&nbsp; 最大值下标=${s.maxIdx}`;
  
  // 渲染UI和结果
  renderUI(s);
  renderResult(s.result);
  renderCode(s.codeLine);
}

// 单步前进
function goNextStep() {
  if(curStepIdx >= stepQueue.length) return;
  renderCurrentStep();
  curStepIdx++;
}

// 自动播放
function startAutoPlay() {
  if(isPlaying) return;
  if(stepQueue.length === 0) buildSteps();
  isPlaying = true;
  autoPlayBtn.disabled = true;
  pauseBtn.disabled = false;
  timer = setInterval(() => {
    if(curStepIdx >= stepQueue.length) {
      stopAutoPlay();
      return;
    }
    goNextStep();
  }, 1200); // 慢一点，便于观察
}

// 暂停
function stopAutoPlay() {
  clearInterval(timer);
  timer = null;
  isPlaying = false;
  autoPlayBtn.disabled = false;
  pauseBtn.disabled = true;
}

// 重置全部
function resetAll() {
  stopAutoPlay();
  curStepIdx = 0;
  stepQueue = [];
  // 初始渲染
  arrWrap.innerHTML = '';
  originNums.forEach(num => {
    const div = document.createElement('div');
    div.className = 'cell';
    div.textContent = num;
    arrWrap.appendChild(div);
  });
  resultWrap.innerHTML = '';
  stepText.textContent = "当前步骤：等待操作";
  varText.innerHTML = "";
  renderCode(0);
}

// 按钮事件
autoPlayBtn.onclick = startAutoPlay;
pauseBtn.onclick = stopAutoPlay;
nextStepBtn.onclick = goNextStep;
resetBtn.onclick = resetAll;

// 初始渲染
resetAll();
</script>
</body>
</html>
